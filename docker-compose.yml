services:
  image-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: "dev"
        BUILD_DATE: "${BUILD_DATE:-unknown}"
    ports:
      - "8043:8080"
    volumes:
      - ./image-service.toml:/etc/image-service.toml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
