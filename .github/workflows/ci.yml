name: CI

# Required secrets : GITHUB_TOKEN (automatic, used only on master push to push to GHCR)
# Required vars    : none

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel redundant in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum required permissions for all jobs.
# docker-build raises this to packages:write at job level when it needs to push.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      # TODO: pin all action refs to full commit SHAs for supply-chain security.
      # Use `pin-github-action` CLI or enable Dependabot for GitHub Actions to automate this.
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Reads the version from go.mod — never drifts from the declared toolchain.
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

      - name: Build binary
        run: go build ./cmd/image-service/

  docker-build:
    name: Docker Build (push on master)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write   # needed to push to GHCR on master; harmless on PR/branch runs
    steps:
      - uses: actions/checkout@v4

      # Generate :latest tag metadata — only used when pushing on master.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      # Buildx is required for GHA layer caching and future multi-platform support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only log in when we are actually going to push (master branch push events).
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Push only on direct pushes to master; PRs and other branches build only.
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref == 'refs/heads/master' && github.event_name == 'push' && 'latest' || 'ci' }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
