name: CI

# Required secrets : none
# Required vars    : none

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel redundant in-progress runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimum required permissions for all jobs.
permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      # TODO: pin all action refs to full commit SHAs for supply-chain security.
      # Use `pin-github-action` CLI or enable Dependabot for GitHub Actions to automate this.
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Reads the version from go.mod — never drifts from the declared toolchain.
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Run tests
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage.out
          retention-days: 7

      - name: Build binary
        run: go build ./cmd/image-service/

  docker-build:
    name: Docker Build (no push)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # Buildx is required for GHA layer caching and future multi-platform support.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: image-service:ci
          build-args: |
            VERSION=ci
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
