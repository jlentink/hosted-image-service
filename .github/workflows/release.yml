name: Release

# Required secrets : GITHUB_TOKEN (automatic)
# Required vars    : none

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # This job only reads code — it does not publish anything.
    permissions:
      contents: read
    steps:
      # TODO: pin all action refs to full commit SHAs for supply-chain security.
      # Use `pin-github-action` CLI or enable Dependabot for GitHub Actions to automate this.
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Reads the version from go.mod — never drifts from the declared toolchain.
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libvips-dev

      - name: Run tests
        run: go test -race -count=1 ./...

  docker:
    name: Build & Push Docker Image
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write   # needed to push to GHCR
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # :latest is intentionally omitted here — it is published by ci.yml on master push

      # Buildx must be set up before login so the builder is ready.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  wordpress-plugin:
    name: Package WordPress Plugin
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create plugin zip
        run: |
          cd wordpress-plugin
          zip -r ../wp-image-resizer-${{ github.ref_name }}.zip wp-image-resizer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-image-resizer-${{ github.ref_name }}
          path: wp-image-resizer-${{ github.ref_name }}.zip

  release:
    name: Create GitHub Release
    needs: [docker, wordpress-plugin]
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write   # needed to create a GitHub Release
    steps:
      # No checkout needed — this job only downloads the artifact and calls the API.
      - name: Download plugin zip
        uses: actions/download-artifact@v4
        with:
          name: wp-image-resizer-${{ github.ref_name }}

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            wp-image-resizer-${{ github.ref_name }}.zip
